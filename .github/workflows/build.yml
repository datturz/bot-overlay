name: Build L2M Boss Timer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 supabase python-dotenv pyinstaller requests pygame

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env

      - name: Build Windows executable
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: L2M_BossTimer_Windows
          path: dist/L2M_BossTimer_v2.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 supabase python-dotenv pyinstaller requests pygame

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env

      - name: Build macOS app
        run: |
          python -m PyInstaller --clean --noconfirm build_macos.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "L2M Boss Timer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "L2M_BossTimer.app" 150 190 \
            --hide-extension "L2M_BossTimer.app" \
            --app-drop-link 450 190 \
            "dist/L2M_BossTimer_macOS.dmg" \
            "dist/L2M_BossTimer.app" || true

      - name: Zip app as fallback
        run: |
          cd dist && zip -r L2M_BossTimer_macOS.zip L2M_BossTimer.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: L2M_BossTimer_macOS
          path: |
            dist/*.dmg
            dist/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: L2M_BossTimer_Windows
          path: artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: L2M_BossTimer_macOS
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
